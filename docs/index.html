<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programación FULLSTACK - Índice de Proyectos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            position: relative;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 1.3em;
            font-weight: bold;
        }

        .card-content {
            padding: 20px;
        }

        .links-list {
            list-style: none;
        }

        .links-list li {
            margin-bottom: 12px;
        }

        .links-list a {
            display: block;
            padding: 12px 15px;
            background: #f0f0f0;
            color: #667eea;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .links-list a:hover {
            background: #667eea;
            color: white;
            border-left-color: #764ba2;
            padding-left: 20px;
        }

        .section-title {
            color: white;
            font-size: 1.8em;
            margin: 40px 0 20px 0;
            border-bottom: 3px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 10px;
        }

        .empty-section {
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Progreso */
        .progress-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            margin: 40px 0;
            backdrop-filter: blur(10px);
        }

        .progress-title {
            color: white;
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .progress-bar-container {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            height: 30px;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .progress-bar {
            background: linear-gradient(90deg, #28a745, #20c997);
            height: 100%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .progress-stats {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            min-width: 120px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #20c997;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin-top: 5px;
        }

        /* Tareas */
        .task-card {
            border-left: 5px solid #667eea;
        }

        .task-card.completed {
            border-left-color: #28a745;
        }

        .task-card.pending {
            border-left-color: #ffa500;
        }

        .task-status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 10px;
        }

        .task-status-badge.completed {
            background: #d4edda;
            color: #155724;
        }

        .task-status-badge.pending {
            background: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Programación FULLSTACK</h1>
            <p class="subtitle">Índice de Proyectos y Ejercicios - UTU 2026</p>

        </header>

        <!-- Ejercicios completados -->
        <h2 class="section-title">✅ Ejercicios Completados</h2>
        <div class="grid" id="completedGrid">
            <div style="text-align: center; color: white; padding: 40px;">Cargando...</div>
        </div>

        <!-- Ejercicios en progreso -->
        <h2 class="section-title">🔄 Ejercicios en Progreso</h2>
        <div class="grid" id="pendingGrid">
            <div style="text-align: center; color: white; padding: 40px;">Cargando...</div>
        </div>

        <!-- Sección de progreso de tareas -->
        <div class="progress-section" id="progressSection" style="display: none;">
            <div class="progress-title">📊 Progreso de Tareas</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
            </div>
            <div class="progress-stats">
                <div class="stat-box">
                    <div class="stat-number" id="completedCount">0</div>
                    <div class="stat-label">Completadas</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Total</div>
                </div>
            </div>
        </div>

        <!-- Tareas -->
        <h2 class="section-title">📋 Tareas</h2>
        <div class="grid" id="tasksGrid">
            <div style="text-align: center; color: white; padding: 40px;">Cargando...</div>
        </div>

        <footer>
            <p>&copy; 2026 - Programación FULLSTACK | UTU</p>
        </footer>
    </div>

    <script>
        // Cargar y mostrar proyectos y tareas
        fetch('./projects.json')
            .then(r => r.json())
            .then(data => {
                // Renderizar completados
                const completed = data.projects.filter(p => p.type === 'completed');
                document.getElementById('completedGrid').innerHTML = completed.length > 0
                    ? completed.map(p => createCard(p)).join('')
                    : '<div style="text-align: center; color: white; padding: 40px;">No hay ejercicios completados</div>';

                // Renderizar pendientes
                const pending = data.projects.filter(p => p.type === 'pending');
                document.getElementById('pendingGrid').innerHTML = pending.length > 0
                    ? pending.map(p => createCard(p)).join('')
                    : '<div style="text-align: center; color: white; padding: 40px;">¡Todos los ejercicios completados!</div>';

                // Renderizar tareas
                const tasks = data.tasks || [];
                document.getElementById('tasksGrid').innerHTML = tasks.length > 0
                    ? tasks.map(t => createTaskCard(t)).join('')
                    : '<div style="text-align: center; color: white; padding: 40px;">No hay tareas</div>';

                // Actualizar progreso
                if (tasks.length > 0) {
                    const completed = tasks.filter(t => t.completed).length;
                    const percentage = (completed / tasks.length) * 100;
                    document.getElementById('progressSection').style.display = 'block';
                    document.getElementById('progressBar').style.width = percentage + '%';
                    document.getElementById('progressBar').textContent = percentage.toFixed(0) + '%';
                    document.getElementById('completedCount').textContent = completed;
                    document.getElementById('totalCount').textContent = tasks.length;
                }
            });

        // Crear tarjeta de proyecto
        function createCard(p) {
            let content = '';
            if (p.subprojects) {
                content = p.subprojects.map(s => 
                    `<li><a href="${s.path}" target="_blank">${s.emoji} ${s.name}</a></li>`
                ).join('');
            } else if (p.path) {
                content = `<li><a href="${p.path}" target="_blank">Ver Proyecto</a></li>`;
            } else {
                return `<div class="card"><div class="card-header">${p.emoji} ${p.title}</div><div class="card-content"><div class="empty-section">Por completar...</div></div></div>`;
            }
            return `<div class="card"><div class="card-header">${p.emoji} ${p.title}</div><div class="card-content"><ul class="links-list">${content}</ul></div></div>`;
        }

        // Crear tarjeta de tarea
        function createTaskCard(t) {
            const status = t.completed ? 'completed' : 'pending';
            const text = t.completed ? '✅ Completada' : '⏳ Pendiente';
            return `<div class="card task-card ${status}"><div class="card-header">${t.emoji || '📋'} ${t.title}</div><div class="card-content"><p>${t.description || 'Sin descripción'}</p><span class="task-status-badge ${status}">${text}</span></div></div>`;
        }
    </script>
</body>
</html>
