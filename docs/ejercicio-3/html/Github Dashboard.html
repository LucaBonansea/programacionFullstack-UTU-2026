<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dashboard</title>
</head>
<body>

    <!-- HEADER -->
    <header>
        <nav>
            <ul>
                <li><button><span>Menu</span></button></li>
                <li><img src="/assets/img/github.svg" alt="Logo de GitHub"></li>
                <li><button><span>Copilot</span></button></li>
                <li><button><span>Issues</span></button></li>
                <li><button><span>Pull Requests</span></button></li>
                <li><button><span>Projects</span></button></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <!-- SIDEBAR -->
        <aside>
            <nav>
                <ul>
                    <li><a href="">Inicio</a></li>
                    <li><a href="">Repositorios</a></li>
                </ul>
            </nav>

            <section>
                <h2>Repositorios</h2>
                <ul>
                    <li>
                        <article>
                            <img src="/assets/img/github.svg" alt="Repo">
                            <span>Repositorio 1</span>
                        </article>
                    </li>
                    <li>
                        <article>
                            <img src="/assets/img/github.svg" alt="Repo">
                            <span>Repositorio 2</span>
                        </article>
                    </li>
                    <li>
                        <article>
                            <img src="/assets/img/github.svg" alt="Repo">
                            <span>Repositorio 3</span>
                        </article>
                    </li>
                </ul>
            </section>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <section>

            <!-- INPUT / CHAT -->
            <div>
                <h2>Copilot</h2>

                <form>
                    <textarea placeholder="Ask anything"></textarea>

                    <div>
                        <button type="submit"><span>Send</span></button>
                        <button><span>Opción</span></button>
                        <button><span>Opción</span></button>
                    </div>
                </form>
            </div>

            <!-- REPOS -->
            <section>
                <h2>Repositorios populares</h2>

                <div>

                    <article>
                        <img src="logo" alt="Repo pascalorg/editor">
                        <h3><a href="">pascalorg/editor</a></h3>
                        <button><span>Star</span></button>
                    </article>

                    <article>
                        <img src="logo" alt="Repo octocat/hello-world">
                        <h3><a href="">octocat/hello-world</a></h3>
                        <button><span>Star</span></button>
                    </article>

                    <article>
                        <img src="logo" alt="Repo microsoft/vscode">
                        <h3><a href="">microsoft/vscode</a></h3>
                        <button><span>Star</span></button>
                    </article>

                    <article>
                        <img src="logo" alt="Repo torvalds/linux">
                        <h3><a href="">torvalds/linux</a></h3>
                        <button><span>Star</span></button>
                    </article>

                </div>
            </section>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>

        <nav>
            <ul>
                <li><a href="">Terms</a></li>
                <li><a href="">Privacy</a></li>
                <li><a href="">Security</a></li>
                <li><a href="">Status</a></li>
                <li><a href="">Community</a></li>
                <li><a href="">Docs</a></li>
            </ul>
        </nav>

        <div>
            <img src="/assets/img/github.svg" alt="Icono de GitHub">
            <p>© 2026 GitHub, Inc.</p>
        </div>

    </footer>
    <!--FIN DEL DOCUMENTO (INTENTARNDO SUBIR A GITHUB)-->
</body>
</html>
