<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <section class="nav">
        <form action="" class="formulario">
            <div class="container-form">
                <h2>Nombre de la imagen:</h2>
                <input type="text" name="nombre_img" class="nombre_img">
                <h2>Url de la imagen: </h2>
                <input type="textbox" name="url_img" class="url_img">
                <br>
                <button class="add">Agregar</button>
                <button class="remove_all">Borrar galeria</button>
            </div>  
        </form>
        <div class="container-form">
            <p>Imagenes totales: <span class="total" style="background-color: rgb(77, 232, 240);">0</span></p>
            <p>Favoritos: <span class="favoritos" style="background-color: rgb(237, 237, 107);">0</span></p>
            <p>No favoritas: <span class="no-favoritas" style="background-color: rgb(228, 107, 237);">0</span></p>
            <button class="show_all" >Mostrar todas</button>
            <button class="fav_all">Mostrar favoritas</button>
            <button class="no_fav_all">Mostrar no favoritas</button>    
        </div>
    </section>
    


    <div class="error"></div>

    <div class="galeria">

    </div>

    <script src="script.js" type="text/javascript"></script>
</body>
</html>
